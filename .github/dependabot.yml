version: 2
updates:
- package-ecosystem: docker
  directory: "/Appium"
  schedule:
    interval: daily
    time: '01:00'
    timezone: "Europe/Berlin"
  commit-message:
    prefix: "[docker] "
  target-branch: "master"
  open-pull-requests-limit: 10
  labels:
    - "dependabot"
    - "docker"
  reviewers:
    - "budtmo"

- package-ecosystem: github-actions
  directory: "/"
  schedule:
    interval: daily
    time: '01:00'
    timezone: "Europe/Berlin"
  commit-message:
    prefix: "[github-action] "
  target-branch: "master"
  open-pull-requests-limit: 10
  labels:
    - "dependabot"
    - "github-action"
  reviewers:
    - "budtmo"
